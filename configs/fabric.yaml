device: "cuda"
gpu_id: 0
vram_limit_mb: 0
ram_spillover_limit_mb: 8192

llm_model: "llama3:8b"
llm_backend: "llama.cpp"

vector_dim: 768
vector_index_type: "flat"    # flat | ivf
vector_metric: "cosine"      # cosine | l2 | ip
vector_nlist: 100
vector_fp16: true

cache_enabled: true
cache_size_mb: 2048
cache_max_entries: 100000
cache_similarity_threshold: 0.95

agent_max_instances: 16
agent_state_dim: 4096
agent_hidden_dim: 4096

scheduler_policy: "auto"
scheduler_tick_ms: 100
scheduler_target_occupancy: 0.70

share_llm: 0.70
share_vector: 0.15
share_agent: 0.10
share_cache: 0.05

telemetry_enabled: false
telemetry_port: 9090
